name: Publish TechDocs
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'catalog-info.yaml'
      - '.github/workflows/publish-techdocs.yaml'
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
permissions: {}
jobs:
  publish-docs:
    uses: grafana/shared-workflows/.github/workflows/publish-techdocs.yaml@c40cd34c3b8982cf51cad94f0b339ff447ab2cc2 # main
    permissions:
      contents: read
      id-token: write
    with:
      namespace: default
      kind: component
      name: xk6-dashboard
      default-working-directory: .
